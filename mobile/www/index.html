<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MAXEK ERP</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    .wrap {
      min-height: 100%;
      display: grid;
      place-items: center;
      padding: 24px;
      background: #f5f7fb;
    }
    .card {
      width: min(520px, 100%);
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 18px;
      background: #fff;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }
    h1 { font-size: 18px; margin: 0 0 10px; color: #0f172a; }
    p { margin: 0 0 12px; color: #475569; line-height: 1.4; font-size: 14px; }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #cbd5e1;
      font-size: 14px;
    }
    button {
      margin-top: 10px;
      width: 100%;
      padding: 12px;
      border: 0;
      border-radius: 12px;
      background: #2563eb;
      color: #fff;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
    }
    .hint { margin-top: 10px; font-size: 12px; color: #64748b; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>MAXEK ERP</h1>
      <p>Enter your ERP URL (Streamlit). Phone and PC must be on the same Wi‑Fi.</p>
      <input id="url" type="url" placeholder="http://192.168.1.10:8501" autocomplete="off" />
      <button type="button" id="open">Open ERP</button>
      <div class="hint">Example: http://YOUR_PC_IP:8501 — run <strong>streamlit run web_app.py</strong> on your PC first.</div>
    </div>
  </div>
  <script>
    const key = "maxek_erp_url";
    const input = document.getElementById("url");
    const saved = localStorage.getItem(key);
    if (saved) input.value = saved;
    document.getElementById("open").addEventListener("click", function () {
      const url = (input.value || "").trim();
      if (!url) {
        alert("Please enter your ERP URL.");
        return;
      }
      localStorage.setItem(key, url);
      window.location.href = url;
    });
  </script>
</body>
</html>
